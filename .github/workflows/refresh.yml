name: Refresh data cache

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 7 AM ET (approx), after FRED updates
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build cache
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python src/build_cache.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.pkl
          git diff --staged --quiet || git commit -m "chore: refresh data cache [skip ci]"
          git push
