name: Refresh data cache

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC = 7 AM ET (approx), after FRED updates
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build cache
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python src/build_cache.py

      - name: Send alert email (on threshold crossing)
        continue-on-error: true
        env:
          SMTP_USER:        ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:    ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAILS:     ${{ secrets.ALERT_EMAILS }}
          ALERT_THRESHOLD:  ${{ secrets.ALERT_THRESHOLD }}
        run: python src/send_alert.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.pkl
          git diff --staged --quiet || git commit -m "chore: refresh data cache [skip ci]"
          git push
